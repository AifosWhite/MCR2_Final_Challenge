# Config de navegacion (Bug0/Bug2 + wall-following) para FISICO.
# Aplica al nodo: bug_controller

bug_controller:
  ros__parameters:
    controller_update_rate: 25.0
    controller_type: "BUG2"   # "BUG0" o "BUG2"

    # Tolerancia de llegada al waypoint
    distance_tolerance: 0.25 #antes 0.12

    # Velocidades
    v_max: 0.12
    w_max: 1.2
    p2p_v_Kp: 0.8
    p2p_w_Kp: 0.9

    # Seguimiento de pared
    following_walls_distance: 0.25
    front_stop_distance: 0.24 #antes 0.30
    lookahead_distance: 0.30
    bug2_line_tol: 0.20
    min_wall_follow_distance: 0.08
    fw_w_Kp: 1.0
    fw_e_Kp: 3.5
    fw_linear_speed: 0.12
    fw_outer_corner_angular_speed: 1.2
    fw_outer_corner_linear_speed: 0.16

    # Aperturas angulares de las regiones del LiDAR (rad)
    side_open_angle: 0.5236
    front_open_angle: 0.4

    # Offset de montaje del LiDAR (rad): angulo del scan que mira al FRENTE del robot.
    # Si lee la pared de ATRAS como "front" al arrancar -> LiDAR girado ~180 deg.
    # Calibra viendo /scan en RViz.
    lidar_yaw_offset: 3.14159

    # Suavizado angular (rad/s^2). 0 = sin limite.
    max_w_accel: 4.0

    # Waypoints (frame odom/EKF)
    # Lazo completo: 70->701->706->75->703->702->708->705
    # waypoints_x: [1.55, 2.82, 2.16, 2.75, 1.54, 0.27, 1.19, 0.89]
    # waypoints_y: [-0.30, -0.30, -1.25, -2.10, -2.07, -2.13, -1.51, -0.90]
    waypoints_x: [2.18] # solo el waypoint del centro del laberinto (marcador 703)
    waypoints_y: [-0.30]
    loop: false