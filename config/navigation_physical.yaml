# Config de navegacion (control Bug2 + seguimiento de pared) para FISICO.
# Aplica al nodo: bug_controller

bug_controller:
  ros__parameters:
    controller_update_rate: 25.0
    controller_type: "BUG2"        # "BUG0" o "BUG2"
    overwrite_min_max_angles: true # IMPORTANTE en fisico: LiDAR real va 0..2pi
    loop: true

    # Tolerancias de llegada
    distance_tolerance: 0.12
    angular_tolerance: 0.20
    angular_adjustment: 0.1745     # gira primero, luego avanza

    # Velocidades (fisico: conservador)
    v_max: 0.12
    w_max: 1.5
    p2p_v_Kp: 0.8
    p2p_w_Kp: 1.2

    # Seguimiento de pared
    following_walls_distance: 0.25
    front_stop_distance: 0.30
    lookahead_distance: 0.30
    fw_w_Kp: 1.2
    fw_e_Kp: 8.0
    fw_linear_speed: 0.10
    fw_outer_corner_angular_speed: 2.0
    fw_outer_corner_linear_speed: 0.15

    # Aperturas angulares de las regiones del LiDAR (rad)
    side_open_angle: 0.5236
    front_open_angle: 0.4
    target_open_angle: 0.5

    # Ruta cerrada (origin-centered, frame odom/EKF).
    # En FISICO, reemplaza por los centros de pasillo medidos en tu maze real.
    waypoints_x: [1.20, 1.00, 0.80, 0.05, 0.10, 1.30, 1.00, 0.85, 0.25,
                  0.65, 0.50, 0.35, 0.15, -0.25, -0.45, -1.30, -0.40,
                  -0.20, 0.00, 0.10, 0.90, 1.05, 1.20]
    waypoints_y: [-1.00, -1.30, -1.10, -0.40, -0.20, 1.00, 0.70, 0.75,
                  1.30, 0.90, 0.20, 0.05, 0.15, 0.55, 0.50, -0.30, 0.55,
                  0.50, -0.05, -0.45, -1.20, -1.15, -1.00]
