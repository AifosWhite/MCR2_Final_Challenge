# Config de navegacion (control Bug2 + seguimiento de pared) para FISICO.
# Aplica al nodo: bug_controller

bug_controller:
  ros__parameters:
    controller_update_rate: 25.0
    controller_type: "BUG2"        # "BUG0" o "BUG2"
    overwrite_min_max_angles: true # IMPORTANTE en fisico: LiDAR real va 0..2pi
    loop: true

    # Tolerancias de llegada
    distance_tolerance: 0.12
    angular_tolerance: 0.20
    angular_adjustment: 0.1745     # gira primero, luego avanza

    # Velocidades (fisico: conservador)
    # w_max y p2p_w_Kp bajados para que los giros sean SUAVES (antes 1.5/1.2 -> bruscos).
    v_max: 0.12
    w_max: 1.2
    p2p_v_Kp: 0.8
    p2p_w_Kp: 0.9

    # Seguimiento de pared
    # Bajados para la demo de PASILLO LIBRE (Opcion A): el giro de 180 y el regreso
    # no disparan wall-following por las paredes laterales (~0.40 m). Para el maze
    # COMPLETO (rodear paredes) subir de nuevo a ~0.25/0.30.
    following_walls_distance: 0.16
    front_stop_distance: 0.20
    lookahead_distance: 0.30
    # Suavizado del seguir-pared: fw_e_Kp alto saturaba w (giros a tirones);
    # corner_angular > w_max hacia esquinas bruscas.
    fw_w_Kp: 1.0
    fw_e_Kp: 3.5
    fw_linear_speed: 0.10
    fw_outer_corner_angular_speed: 1.2
    fw_outer_corner_linear_speed: 0.15

    # Aperturas angulares de las regiones del LiDAR (rad)
    side_open_angle: 0.5236
    front_open_angle: 0.4
    target_open_angle: 0.5


    # Offset de montaje del LiDAR (rad): angulo del scan que mira al FRENTE del robot.
    # Si al arrancar lee la pared de ATRAS como "front" y se mete a wall-following,
    # el LiDAR esta girado ~180 deg -> usa 3.14159. Calibra viendo /scan en RViz.
    lidar_yaw_offset: 3.14159

    # === OPCION A: ruta corta SEGURA (primera prueba real) ===
    # Ida y vuelta por el pasillo IZQUIERDO (libre desde el inicio), frame esquina:
    # x arriba [0,3.075], y neg a la derecha [0,-3.05]. Inicio robot (0.325,-0.28) mira +x.
    # Recorrido: sube por y~-0.3, pasa frente al marcador 70 (1.85,-0.30, mira abajo) ->
    # llega cerca de 701 arriba (2.82,0.0) -> regresa. Sin cruces diagonales (esos chocan).
    waypoints_x: [1.00, 1.40, 0.70]
    waypoints_y: [-0.28, -0.28, -0.28]

    # --- Lazo completo del maze (BORRADOR, requiere verificar en RViz antes de usar) ---
    # Lazo: 70->701->706->75->703->702->708->705. Puntos frente a cada marcador OK,
    # pero segmentos NO verificados contra paredes interiores.
    # waypoints_x: [1.55, 2.82, 2.16, 2.75, 1.54, 0.27, 1.19, 0.89]
    # waypoints_y: [-0.30, -0.30, -1.25, -2.10, -2.07, -2.13, -1.51, -0.90]