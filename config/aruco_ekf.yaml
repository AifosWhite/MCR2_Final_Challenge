aruco_ekf_localisation:
  ros__parameters:
    x0: 0.0
    y0: 0.0
    theta0: 0.0
    wheel_radius: 0.05
    wheel_base: 0.19
    kr: 0.002
    kl: 0.002
    odom_frame: "odom"
    base_frame: "base_link"
    output_topic: "ekf_odom"
    timer_period: 0.05

    # Posiciones de los 8 marcadores fisicos ArUco (DICT_4X4_1000) para la
    # correccion EKF. Maze exterior 3.43 x 3.41 m, centro en (0,0).
    # ADVERTENCIA: estas posiciones son APROXIMADAS (deducidas de un boceto a
    # mano). RE-MEDIR cada marcador con cinta antes de la corrida real: el EKF
    # es muy sensible a errores de pocos cm en la posicion del marcador.
    # (Nota de mapeo: el nodo usa marker_x/marker_y, no marker_pos_x/_y.)
    marker_ids: [70,    706,   75,    701,   703,   705,   708,   702 ]
    marker_x:   [-1.55, -0.35, 0.95,  0.95,  0.61,  0.31,  -0.33, 0.31 ]
    marker_y:   [ 0.30,  0.95, 1.25, -0.32, -0.32, -0.60, -0.34, -1.28]
    marker_frame_prefix: "marker_"
    # Modelo de medicion rango-azimut (como en la presentacion):
    # desviacion estandar del rango (m) y del azimut (rad).
    measurement_noise_range: 0.05
    measurement_noise_bearing: 0.02
