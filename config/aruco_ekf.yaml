aruco_ekf_localisation:
  ros__parameters:
    x0: 0.0
    y0: 0.0
    theta0: 0.0
    wheel_radius: 0.05
    wheel_base: 0.19
    kr: 0.002
    kl: 0.002
    odom_frame: "odom"
    base_frame: "base_link"
    output_topic: "ekf_odom"
    timer_period: 0.05

    # Map position of the ArUco markers used for EKF correction.
    # Tune these coordinates to the final Gazebo/physical setup.
    marker_ids: [705, 706, 70, 703, 708, 75, 702]
    marker_x: [-0.50, -0.50, -1.30, 0.40, -0.35, 0.80, 0.30]
    marker_y: [-0.88, 0.82, 0.20, -0.28, -0.25, 1.12, -1.15]
    marker_frame_prefix: "marker_"
    measurement_noise_xy: 0.03
